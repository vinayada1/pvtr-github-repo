loglevel: info # increase to trace for more verbose output
write-directory: evaluation_results
write: true # Change to false if you don't want to write the results to disk
output: yaml # Change to json if you want CLI and written output in json format
services:
  # if there are multiple entries here, multiple services can be run via Privateer
  # while running via debug, only one service can be run at a time using --service=<service_name>
  
  <service_name>: # unique name/id for the evaluation
    
    plugin: github-repo # required while running via Privateer
    
    # The policy section may be set at the top level if assessing multiple services via privateer
    policy:
      catalogs:
        - osps-baseline-2026-02 # use osps-baseline-2025-10 for the previous version
      applicability:
        - Maturity Level 1
        # - Maturity Level 2
        # - Maturity Level 3
    
    # All variables are required to run the evaluation
    vars:
      owner: <github org or user name>
      repo: <github repo name>
      token: <classic token with permissions repo + admin:org>

      # --- AI-assisted evaluation (optional) ---
      # When these keys are set, AI-capable controls (e.g. OSPS-QA-06.02) call
      # the configured provider to assess repository documentation. When they
      # are missing or incomplete, the scanner falls back to its existing
      # review-needed behavior and no requests leave the host. See the
      # "AI-Assisted Checks" section of the README for details.
      #
      # Required keys (the minimum needed to enable AI):
      # ai_provider: <provider id>            # AI provider id (only "openai" is supported today; more providers will be added in future releases)
      # ai_model: <chat model id>             # a chat-completions model id offered by the provider (for example, "gpt-4o-mini")
      # ai_api_key: <your-provider-api-key>   # provider API key (not required when ai_dry_run is true)
      #
      # Optional keys (override defaults):
      # ai_base_url: https://api.openai.com/v1 # override the OpenAI endpoint (e.g. an OpenAI-compatible self-hosted runtime or local dev proxy); defaults to https://api.openai.com/v1
      # ai_timeout: 30s                       # per-request timeout (Go duration); default 30s
      # ai_max_tokens: 256                    # response token budget; default 256
      # ai_dry_run: false                     # skip real provider calls; default false

