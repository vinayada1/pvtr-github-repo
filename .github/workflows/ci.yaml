---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build
        run: make -B build
      - name: Plugin Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          ./.github/scripts/ci.sh 2>&1 | tee integration_output.txt
      - name: Verify test output
        run: |
          # Keep the workflow aligned with the code-level compatibility contract.
          expected_count=$(go run ./cmd/list-supported-catalogs | wc -l | tr -d ' ')
          actual_count=$(grep -c '^COMPAT_CONFIG_OK ' integration_output.txt)
          test "$actual_count" -eq "$expected_count"
